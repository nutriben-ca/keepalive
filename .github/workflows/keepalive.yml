name: Supabase Keepalive – Nutriben

on:
  schedule:
    - cron: '0 14 */5 * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  ping-supabase:
    name: Ping Supabase projects
    runs-on: ubuntu-latest
    steps:
      - name: Ping Nutriben (lzljnszgqjxxufpkcolv)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://lzljnszgqjxxufpkcolv.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_NUTRIBEN }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_NUTRIBEN }}")
          echo "Nutriben: HTTP $STATUS"

      - name: Ping preclinica-etapa-1 (hwfppixepttcwuqlyuqo)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hwfppixepttcwuqlyuqo.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_NUTRIBEN }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_NUTRIBEN }}")
          echo "preclinica-etapa-1: HTTP $STATUS"

  keepalive-github:
    name: Keep GitHub Actions alive
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
