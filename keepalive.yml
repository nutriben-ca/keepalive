name: Supabase Keepalive – Nutriben

on:
  schedule:
    # Corre cada 5 días a las 8:00 AM Honduras (UTC-6 = 14:00 UTC)
    - cron: '0 14 */5 * *'
  workflow_dispatch: # También permite correrlo manualmente desde GitHub

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Nutriben
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://lzljnszgqjxxufpkcolv.supabase.co/rest/v1/expense_profiles?limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6bGpuc3pncWp4eHVmcGtjb2x2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1MTU2NzMsImV4cCI6MjA2NTA5MTY3M30.EtFJ4lpVx39gTbcFZHnFG44C7GkCoVCOT8f-v25NHXY" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6bGpuc3pncWp4eHVmcGtjb2x2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1MTU2NzMsImV4cCI6MjA2NTA5MTY3M30.EtFJ4lpVx39gTbcFZHnFG44C7GkCoVCOT8f-v25NHXY")
          echo "Supabase respondió con HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Proyecto Nutriben activo y saludable"
          else
            echo "⚠️ Respuesta inesperada: $STATUS"
            exit 1
          fi
